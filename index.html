<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miho Takahashi | Creative Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        tailwind.config = { theme: { extend: { colors: { 'accent-blue': '#007AFF' } } } }
        .font-serif { font-family: "Playfair Display", "Times New Roman", serif; }
        [x-cloak] { display: none !important; }
        html { scroll-behavior: smooth; }
        section { scroll-margin-top: 80px; }

        .white-plus {
            position: relative;
            width: 18px;
            height: 18px;
            display: inline-block;
        }
        .white-plus::before, .white-plus::after {
            content: '';
            position: absolute;
            background-color: white;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .white-plus::before { width: 3px; height: 100%; }
        .white-plus::after { width: 100%; height: 3px; }
    </style>
</head>
<body class="bg-white text-gray-900" x-data="shopApp()">

<nav class="fixed top-0 left-0 w-full z-50 transition-all duration-500" 
     :class="scrolled ? 'bg-white/95 backdrop-blur-md py-4 shadow-md' : 'bg-transparent py-8'"
     @scroll.window="scrolled = (window.pageYOffset > 50)">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
        <a href="#home" class="text-2xl font-bold text-accent-blue font-serif">Miho Takahashi</a>
        <div class="flex items-center space-x-6">
            <div class="hidden md:flex items-center space-x-8 text-[10px] uppercase font-black tracking-widest">
                <a href="#home" class="hover:text-accent-blue transition-colors">Home</a>
                <a href="#concept" class="hover:text-accent-blue transition-colors">Concept</a>
                <a href="#lookbook" class="hover:text-accent-blue transition-colors">Look Book</a>
                <a href="#shop" class="hover:text-accent-blue transition-colors">Shop</a>
            </div>
            <button @click="cartOpen = true" class="relative p-2 text-accent-blue z-50">
                <i data-lucide="shopping-cart"></i>
                <span x-show="cartCount > 0" class="absolute -top-1 -right-1 bg-gray-900 text-white text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-white shadow-lg" x-text="cartCount"></span>
            </button>
            <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden text-accent-blue relative z-[100] p-2">
                <i data-lucide="menu" x-show="!mobileMenuOpen"></i>
                <i data-lucide="x" x-show="mobileMenuOpen" x-cloak></i>
            </button>
        </div>
    </div>
</nav>

<section id="lookbook" class="py-24 px-6 bg-gray-50">
    <div class="max-w-7xl mx-auto">
        <h2 class="text-4xl md:text-5xl font-serif font-bold mb-16 text-center">Look Book</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12 max-w-5xl mx-auto items-stretch">
            <div class="group flex flex-col h-full text-center">
                <div class="aspect-[4/5] bg-white rounded-[40px] overflow-hidden shadow-sm flex items-center justify-center p-4 h-full">
                    <img src="sinkaiwhite.svg" class="w-full h-full object-contain" alt="2025 Winter">
                </div>
                <div class="mt-8 text-center flex-none">
                    <p class="text-[10px] tracking-[0.3em] uppercase font-black text-accent-blue mb-2">2025 Winter collection</p>
                    <h3 class="text-2xl font-serif font-bold">Sinkai - 深海</h3>
                </div>
            </div>
            <div class="group flex flex-col h-full text-center">
                <div class="aspect-[4/5] bg-white rounded-[40px] overflow-hidden shadow-sm flex items-center justify-center p-4 h-full">
                    <img src="siteimage.svg" class="w-full h-full object-contain" alt="2026 Spring">
                </div>
                <div class="mt-8 text-center flex-none">
                    <p class="text-[10px] tracking-[0.3em] uppercase font-black text-accent-blue mb-2">2026 Spring collection</p>
                    <h3 class="text-2xl font-serif font-bold">New Bloom - 萌芽</h3>
                </div>
            </div>
        </div>
    </div>
</section>

<section id="shop" class="py-24 px-6 bg-white border-t border-gray-50">
    <div class="max-w-7xl mx-auto">
        <h2 class="text-4xl md:text-5xl font-serif font-bold mb-16 text-center">Shop</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-12">
            <template x-for="item in products" :key="item.id">
                <div class="flex flex-col items-center text-center group">
                    <div class="w-full aspect-square mb-6 bg-pink-50/50 rounded-[40px] flex items-center justify-center p-8 relative overflow-hidden transition-all group-hover:shadow-2xl cursor-pointer"
                         @click="openDetail(item)">
                        <img :src="item.img" class="w-full h-full object-contain group-hover:scale-110 transition-transform duration-500">
                        <button @click.stop="addToCart(item)" 
                                class="absolute bottom-6 right-6 bg-gray-900 w-14 h-14 rounded-full shadow-xl flex items-center justify-center z-20 transition-all md:opacity-0 md:group-hover:opacity-100 active:scale-95">
                            <span class="white-plus"></span>
                        </button>
                    </div>
                    <h3 class="text-xl font-bold cursor-pointer" @click="openDetail(item)" x-text="item.title"></h3>
                    <p class="text-gray-400 font-serif italic text-sm" x-text="'¥' + item.price.toLocaleString()"></p>
                </div>
            </template>
        </div>
    </div>
</section>

<div x-show="detailOpen" x-cloak class="fixed inset-0 z-[110] flex items-center justify-center px-6">
    <div @click="detailOpen = false" class="absolute inset-0 bg-black/60 backdrop-blur-md"></div>
    <div x-show="detailOpen" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 scale-95"
         class="relative bg-white w-full max-w-4xl max-h-[90vh] rounded-[40px] shadow-2xl overflow-hidden flex flex-col md:flex-row">
        
        <button @click="detailOpen = false" class="absolute top-6 right-6 z-10 p-2 bg-gray-100 rounded-full hover:bg-gray-200 transition-colors">
            <i data-lucide="x"></i>
        </button>

        <div class="w-full md:w-1/2 bg-pink-50/30 flex items-center justify-center p-12">
            <img :src="selectedItem?.img" class="w-full h-full object-contain max-h-[400px]">
        </div>

        <div class="w-full md:w-1/2 p-10 md:p-16 flex flex-col justify-center text-left">
            <p class="text-[10px] tracking-[0.3em] uppercase font-black text-accent-blue mb-4">Product Details</p>
            <h2 class="text-3xl font-serif font-bold mb-4" x-text="selectedItem?.title"></h2>
            <p class="text-2xl font-serif italic mb-8" x-text="'¥' + selectedItem?.price.toLocaleString()"></p>
            
            <div class="space-y-6 mb-10 overflow-y-auto max-h-[200px] pr-2">
                <div>
                    <h4 class="text-[10px] uppercase font-black text-gray-400 tracking-widest mb-1">Description</h4>
                    <p class="text-sm text-gray-600 leading-relaxed" x-text="selectedItem?.description"></p>
                </div>
                <div class="flex space-x-12">
                    <div>
                        <h4 class="text-[10px] uppercase font-black text-gray-400 tracking-widest mb-1">Size</h4>
                        <p class="text-sm text-gray-600" x-text="selectedItem?.size"></p>
                    </div>
                    <div>
                        <h4 class="text-[10px] uppercase font-black text-gray-400 tracking-widest mb-1">Material</h4>
                        <p class="text-sm text-gray-600" x-text="selectedItem?.material"></p>
                    </div>
                </div>
            </div>

            <button @click="addToCart(selectedItem); detailOpen = false" 
                    class="w-full bg-accent-blue text-white py-5 rounded-full font-bold uppercase tracking-widest shadow-xl hover:bg-blue-600 transition-all flex justify-center items-center space-x-3">
                <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                <span>Add to Cart</span>
            </button>
        </div>
    </div>
</div>

<script>
    function shopApp() {
        return {
            scrolled: false,
            cartOpen: false,
            mobileMenuOpen: false,
            detailOpen: false, // 詳細画面の開閉
            selectedItem: null, // 選択された商品データ
            purchaseStep: 'cart',
            isProcessing: false,
            cart: [],
            products: [
                { 
                    id: '01', title: 'Art Mag Cup', price: 2800, img: 'mag.png',
                    description: '朝のコーヒータイムを彩る、色彩豊かなオリジナルマグカップです。',
                    size: 'H95mm x W80mm', material: 'Ceramic'
                },
                { 
                    id: '02', title: 'Canvas Art Print', price: 12000, img: 'kaiga.png',
                    description: '高品質なキャンバスにジークレープリントを施した、空間を引き立てる一点。',
                    size: 'F4 (333mm x 242mm)', material: 'Canvas, Wood'
                },
                { 
                    id: '03', title: 'Design Cushion', price: 4500, img: 'cusion.png',
                    description: '手触りの良い素材に、ダイナミックなグラフィックをプリントしました。',
                    size: '45cm x 45cm', material: 'Polyester, Cotton'
                },
                { 
                    id: '04', title: 'Artist T-shirt', price: 3800, img: 'shirt.png',
                    description: '日常にアートを纏う。肌馴染みの良い上質なコットンを使用した一枚。',
                    size: 'S, M, L, XL', material: '100% Cotton'
                },
            ],
            openDetail(item) {
                this.selectedItem = item;
                this.detailOpen = true;
                setTimeout(() => lucide.createIcons(), 100);
            },
            get cartCount() { return this.cart.reduce((sum, item) => sum + item.quantity, 0) },
            get total() { return this.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0) },
            addToCart(product) {
                const existing = this.cart.find(i => i.id === product.id);
                if (existing) { existing.quantity++ } else { this.cart.push({...product, quantity: 1}) }
                this.cartOpen = true;
                this.purchaseStep = 'cart';
                setTimeout(() => lucide.createIcons(), 100);
            },
            removeFromCart(id) { this.cart = this.cart.filter(i => i.id !== id) },
            processPurchase() {
                this.isProcessing = true;
                setTimeout(() => {
                    this.isProcessing = false;
                    this.purchaseStep = 'complete';
                    this.cart = [];
                    setTimeout(() => lucide.createIcons(), 100);
                }, 1000);
            },
            init() { 
                lucide.createIcons();
                setTimeout(() => lucide.createIcons(), 100);
            }
        }
    }
</script>
</body>
</html>

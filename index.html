<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miho Takahashi | Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        tailwind.config = { theme: { extend: { colors: { 'accent-blue': '#007AFF' } } } }
        .font-main-title { font-family: "Times New Roman", Times, serif; letter-spacing: -0.02em; }
        [x-cloak] { display: none !important; }
        html { scroll-behavior: smooth; }
        section { scroll-margin-top: 80px; }

        /* CSSで作る「＋」マーク（JSに依存しないので絶対消えません） */
        .icon-plus {
            position: relative;
            width: 20px;
            height: 20px;
        }
        .icon-plus::before, .icon-plus::after {
            content: '';
            position: absolute;
            background-color: white; /* 白いプラス */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .icon-plus::before { width: 2px; height: 100%; }
        .icon-plus::after { width: 100%; height: 2px; }
    </style>
</head>
<body class="bg-white text-gray-800" x-data="shopApp()">

<nav class="fixed top-0 left-0 w-full z-50 transition-all duration-500" 
     :class="scrolled ? 'bg-white/95 backdrop-blur-md py-4 shadow-md' : 'bg-transparent py-8'"
     @scroll.window="scrolled = (window.pageYOffset > 50)">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
        <a href="#" class="text-2xl font-bold text-accent-blue font-main-title">Miho Takahashi</a>
        
        <div class="flex items-center space-x-6">
            <div class="hidden md:flex items-center space-x-8">
                <a href="#home" class="text-[10px] uppercase font-bold tracking-widest hover:text-accent-blue">Home</a>
                <a href="#shop" class="text-[10px] uppercase font-bold tracking-widest hover:text-accent-blue">Shop</a>
                <a href="#footer" class="text-[10px] uppercase font-bold tracking-widest hover:text-accent-blue">Contact</a>
            </div>

            <button @click="cartOpen = true" class="relative p-2 text-accent-blue">
                <i data-lucide="shopping-cart"></i>
                <span x-show="cartCount > 0" 
                      class="absolute -top-1 -right-1 bg-gray-900 text-white text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-white shadow-lg" 
                      x-text="cartCount"></span>
            </button>

            <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden text-accent-blue">
                <i data-lucide="menu" x-show="!mobileMenuOpen"></i>
                <i data-lucide="x" x-show="mobileMenuOpen"></i>
            </button>
        </div>
    </div>
</nav>

<section id="home" class="relative h-screen flex items-center justify-center bg-[#FFF5F7] overflow-hidden">
    <div class="absolute inset-0 z-0 pointer-events-none">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] md:w-[700px] h-[300px] md:h-[700px] bg-pink-200/60 rounded-full blur-[80px] md:blur-[140px]"></div>
    </div>
    <div class="text-center relative z-10 px-6">
        <h1 class="text-6xl md:text-9xl font-main-title font-bold mb-8 text-gray-800 leading-tight">
            Creative & <br><span class="text-accent-blue">Colorful</span>
        </h1>
        <button @click="document.getElementById('shop').scrollIntoView({behavior: 'smooth'})" 
                class="bg-accent-blue text-white px-12 py-5 rounded-full font-bold uppercase tracking-widest shadow-lg hover:shadow-2xl transition-all">
            Explore Shop
        </button>
    </div>
    <div class="absolute bottom-10 left-0 right-0 flex justify-center text-accent-blue/40 animate-bounce">
        <i data-lucide="chevron-down" class="w-8 h-8"></i>
    </div>
</section>

<section id="shop" class="py-24 px-6 bg-white">
    <div class="max-w-7xl mx-auto">
        <h2 class="text-4xl md:text-6xl font-main-title font-bold mb-16 text-center">Shop</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-12">
            <template x-for="item in products" :key="item.id">
                <div class="flex flex-col items-center text-center group">
                    <div class="w-full aspect-square mb-6 bg-pink-50/50 rounded-3xl flex items-center justify-center p-8 relative overflow-hidden transition-all group-hover:shadow-xl">
                        <img :src="item.img" class="w-full h-full object-contain group-hover:scale-110 transition-transform duration-500">
                        
                        <button @click="addToCart(item)" 
                                class="absolute bottom-4 right-4 bg-gray-900 w-14 h-14 rounded-full shadow-xl flex items-center justify-center z-20 transition-all md:opacity-0 md:group-hover:opacity-100">
                            <div class="icon-plus"></div>
                        </button>
                    </div>
                    <h3 class="text-xl font-bold" x-text="item.title"></h3>
                    <p class="text-gray-400 font-main-title italic" x-text="'¥' + item.price.toLocaleString()"></p>
                </div>
            </template>
        </div>
    </div>
</section>

<footer id="footer" class="bg-gray-50 py-20 px-6 border-t">
    <div class="max-w-7xl mx-auto text-center">
        <h3 class="text-2xl font-bold text-accent-blue font-main-title mb-4">Miho Takahashi</h3>
        <p class="text-[10px] text-gray-400 font-bold tracking-widest uppercase">©2026 MIHO TAKAHASHI STUDIO.</p>
    </div>
</footer>

<div x-show="cartOpen" x-cloak class="fixed inset-0 z-[100]">
    <div @click="cartOpen = false" class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
    <div x-show="cartOpen" x-transition:enter="transition transform duration-300 translate-x-full" 
         class="absolute top-0 right-0 h-full w-full max-w-md bg-white shadow-2xl flex flex-col p-8">
        
        <div class="flex justify-between items-center mb-12">
            <h2 class="text-2xl font-main-title font-bold" x-text="purchaseStep

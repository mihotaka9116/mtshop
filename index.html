<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miho Takahashi | Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'accent-blue': '#2962ff' }
                }
            }
        }
        [x-cloak] { display: none !important; }
        .creative-underline { position: relative; }
        .creative-underline::after { content: ''; position: absolute; width: 0; height: 2px; bottom: -2px; left: 0; background-color: currentColor; transition: width 0.3s; }
        .creative-underline:hover::after { width: 100%; }
    </style>
</head>
<body class="bg-white selection:bg-accent-blue selection:text-white" x-data="shopApp()">

    <nav class="fixed top-0 left-0 w-full z-50 transition-all duration-500" 
         :class="scrolled ? 'bg-white/80 backdrop-blur-md py-4 shadow-sm' : 'bg-transparent py-8'"
         @scroll.window="scrolled = (window.pageYOffset > 50)">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <a href="#" class="text-2xl font-bold tracking-tight text-accent-blue">Miho Takahashi</a>
            
            <div class="hidden md:flex items-center space-x-8">
                <template x-for="link in navLinks">
                    <a :href="link.href" class="text-xs uppercase font-bold tracking-widest creative-underline opacity-70 hover:opacity-100 transition-opacity" x-text="link.name"></a>
                </template>
                <button @click="cartOpen = true" class="relative p-2 text-accent-blue hover:scale-110 transition-transform">
                    <i data-lucide="shopping-cart"></i>
                    <span x-show="cartCount > 0" class="absolute -top-1 -right-1 bg-accent-blue text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center" x-text="cartCount"></span>
                </button>
            </div>

            <div class="flex items-center space-x-4 md:hidden">
                <button @click="cartOpen = true" class="relative p-2 text-accent-blue">
                    <i data-lucide="shopping-cart"></i>
                    <span x-show="cartCount > 0" class="absolute -top-1 -right-1 bg-accent-blue text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center" x-text="cartCount"></span>
                </button>
                <button @click="mobileMenuOpen = true" class="p-2 text-accent-blue"><i data-lucide="menu"></i></button>
            </div>
        </div>
    </nav>

    <div x-show="mobileMenuOpen" x-cloak x-transition class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center space-y-8 md:hidden">
        <button @click="mobileMenuOpen = false" class="absolute top-8 right-6 p-2 text-accent-blue"><i data-lucide="x" class="w-8 h-8"></i></button>
        <template x-for="link in navLinks">
            <a :href="link.href" @click="mobileMenuOpen = false" class="text-2xl font-bold text-accent-blue" x-text="link.name"></a>
        </template>
    </div>

    <section class="relative h-screen flex items-center justify-center bg-[#FFF0F5]">
        <div class="text-center px-6">
            <h1 class="text-5xl md:text-8xl font-serif font-bold mb-6 text-gray-800">Creative & <br><span class="text-accent-blue">Colorful</span></h1>
            <button @click="document.getElementById('shop').scrollIntoView({behavior: 'smooth'})" class="bg-accent-blue text-white px-10 py-4 rounded-full font-bold uppercase tracking-widest hover:scale-105 transition-all shadow-lg">View Shop</button>
        </div>
    </section>

    <section id="shop" class="py-32 px-6 bg-white">
        <div class="max-w-7xl mx-auto text-center">
            <h2 class="text-4xl md:text-5xl font-serif font-bold mb-20 text-gray-800">Shop</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-12">
                <template x-for="item in products" :key="item.id">
                    <div class="group flex flex-col items-center"> <div class="aspect-[4/3] w-full h-64 md:h-80 mb-6 bg-gray-50 rounded-2xl overflow-hidden relative mx-auto max-w-[600px] shadow-md border border-gray-100">
                            <img :src="item.img" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                            <button @click="addToCart(item)" class="absolute bottom-4 right-4 bg-white text-accent-blue p-4 rounded-xl shadow-xl md:opacity-0 md:group-hover:opacity-100 transition-all md:translate-y-2 md:group-hover:translate-y-0">
                                <i data-lucide="plus"></i>
                            </button>
                        </div>

                        <div class="text-center">
                            <h3 class="font-bold text-xl lg:text-base text-gray-800 mb-1" x-text="item.title"></h3>
                            <p class="text-accent-blue font-bold text-lg lg:text-base" x-text="'¥' + item.price.toLocaleString()"></p>
                        </div>

                    </div>
                </template>
            </div>
        </div>
    </section>

    <div x-show="cartOpen" x-cloak class="fixed inset-0 z-[150]">
        <div @click="cartOpen = false" class="absolute inset-0 bg-black/20 backdrop-blur-sm"></div>
        <div class="absolute top-0 right-0 h-full w-full max-w-md bg-white shadow-2xl flex flex-col" x-transition:enter="transition transform duration-300" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0">
            <div class="p-6 border-b flex justify-between items-center">
                <h2 class="text-xl font-bold">Shopping Cart</h2>
                <button @click="cartOpen = false" class="p-2"><i data-lucide="x"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 space-y-6">
                <template x-if="cart.length === 0"><p class="text-center text-gray-400 py-10">カートは空です</p></template>
                <template x-for="item in cart">
                    <div class="flex space-x-4 items-center">
                        <img :src="item.img" class="w-16 h-16 object-cover rounded-lg flex-shrink-0">
                        <div class="flex-1">
                            <h4 class="font-bold text-sm" x-text="item.title"></h4>
                            <p class="text-xs text-gray-500" x-text="'¥' + item.price.toLocaleString()"></p>
                            <div class="flex items-center justify-between mt-1">
                                <div class="flex items-center border rounded-md">
                                    <button @click="updateQty(item.id, -1)" class="px-2 py-0.5">-</button>
                                    <span class="px-2 text-xs" x-text="item.quantity"></span>
                                    <button @click="updateQty(item.id, 1)" class="px-2 py-0.5">+</button>
                                </div>
                                <button @click="removeFromCart(item.id)" class="text-gray-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
            <div x-show="cart.length > 0" class="p-6 border-t bg-gray-50">
                <div class="flex justify-between mb-4 font-bold text-lg"><span>Total</span><span x-text="'¥' + total.toLocaleString()"></span></div>
                <button class="w-full bg-accent-blue text-white py-4 rounded-xl font-bold Checkout-btn hover:brightness-110 transition-all">Checkout</button>
            </div>
        </div>
    </div>

    <footer id="contact" class="bg-gray-50 pt-20 pb-10 px-6 border-t">
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-12 mb-10 text-left">
            <div>
                <h3 class="text-xl font-bold text-accent-blue mb-4">Miho Takahashi</h3>
                <p class="text-sm text-gray-500 leading-relaxed">日々の暮らしに、少しの彩りとワクワクを。制作したイラストをグッズにし販売しています</p>
            </div>
            <div class="flex space-x-20">
                <div>
                    <h4 class="text-xs uppercase font-bold text-gray-400 mb-4">Link</h4>
                    <ul class="text-sm space-y-2 text-gray-600">
                        <li><a href="#" class="hover:text-accent-blue">Home</a></li>
                        <li><a href="#shop" class="hover:text-accent-blue">Shop</a></li>
                    </ul>
                </div>
                <div>
                    <h4 class="text-xs uppercase font-bold text-gray-400 mb-4">SNS</h4>
                    <ul class="text-sm space-y-2 text-gray-600">
                        <li><a href="#" class="flex items-center"><i data-lucide="instagram" class="w-4 h-4 mr-2"></i>Instagram</a></li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="max-w-7xl mx-auto pt-8 border-t text-[10px] text-gray-400 text-center tracking-widest uppercase">
            ©2026 Miho Takahashi All Rights Reserved.
        </div>
    </footer>

    <script>
        function shopApp() {
            return {
                scrolled: false, cartOpen: false, mobileMenuOpen: false, cart: [],
                navLinks: [{ name: 'Home', href: '#' }, { name: 'Shop', href: '#shop' }, { name: 'Contact', href: '#contact' }],
                products: [
                    { id: 1, title: 'Mag Cup', price: 2800, img: 'mag.png' },
                    { id: 2, title: 'T shirt', price: 3800, img: 'shirt.png' },
                    { id: 3, title: 'Cusion', price: 4500, img: 'cusion.png' },
                    { id: 4, title: 'Picture', price: 12000, img: 'kaiga.png' }
                ],
                get cartCount() { return this.cart.reduce((sum, item) => sum + item.quantity, 0) },
                get total() { return this.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0) },
                addToCart(product) {
                    const existing = this.cart.find(i => i.id === product.id);
                    if (existing) { existing.quantity++ } else { this.cart.push({...product, quantity: 1}) }
                    this.cartOpen = true;
                    this.$nextTick(() => lucide.createIcons());
                },
                updateQty(id, delta) {
                    const item = this.cart.find(i => i.id === id);
                    if (item) { item.quantity = Math.max(1, item.quantity + delta) }
                },
                removeFromCart(id) { this.cart = this.cart.filter(i => i.id !== id) },
                init() { 
                    lucide.createIcons();
                    this.$watch('mobileMenuOpen', value => { if (value) this.$nextTick(() => lucide.createIcons()); });
                    this.$watch('cartOpen', value => { if (value) this.$nextTick(() => lucide.createIcons()); });
                }
            }
        }
    </script>
</body>
</html>

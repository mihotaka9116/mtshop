<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miho Takahashi | Creative Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        tailwind.config = { theme: { extend: { colors: { 'accent-blue': '#007AFF' } } } }
        .font-serif { font-family: "Playfair Display", "Times New Roman", serif; }
        [x-cloak] { display: none !important; }
        html { scroll-behavior: smooth; }
        section { scroll-margin-top: 80px; }

        /* どんな時も絶対に見える「白いプラスマーク」 */
        .white-plus {
            position: relative;
            width: 20px;
            height: 20px;
            display: inline-block;
        }
        .white-plus::before, .white-plus::after {
            content: '';
            position: absolute;
            background-color: white;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .white-plus::before { width: 3px; height: 100%; }
        .white-plus::after { width: 100%; height: 3px; }
    </style>
</head>
<body class="bg-white text-gray-900" x-data="shopApp()">

<nav class="fixed top-0 left-0 w-full z-50 transition-all duration-500" 
     :class="scrolled ? 'bg-white/95 backdrop-blur-md py-4 shadow-md' : 'bg-transparent py-8'"
     @scroll.window="scrolled = (window.pageYOffset > 50)">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
        <a href="#home" class="text-2xl font-bold text-accent-blue font-serif">Miho Takahashi</a>
        
        <div class="flex items-center space-x-6">
            <div class="hidden md:flex items-center space-x-8 text-[10px] uppercase font-black tracking-widest">
                <a href="#home" class="hover:text-accent-blue">Home</a>
                <a href="#concept" class="hover:text-accent-blue">Concept</a>
                <a href="#lookbook" class="hover:text-accent-blue">Look Book</a>
                <a href="#shop" class="hover:text-accent-blue">Shop</a>
            </div>

            <button @click="cartOpen = true" class="relative p-2 text-accent-blue">
                <i data-lucide="shopping-cart"></i>
                <span x-show="cartCount > 0" 
                      class="absolute -top-1 -right-1 bg-gray-900 text-white text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-white shadow-lg" 
                      x-text="cartCount"></span>
            </button>

            <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden text-accent-blue">
                <i data-lucide="menu" x-show="!mobileMenuOpen"></i>
                <i data-lucide="x" x-show="mobileMenuOpen"></i>
            </button>
        </div>
    </div>
</nav>

<section id="home" class="relative h-screen flex items-center justify-center bg-[#FFF5F7] overflow-hidden">
    <div class="absolute inset-0 z-0">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] md:w-[700px] h-[300px] md:h-[700px] bg-pink-200/60 rounded-full blur-[80px] md:blur-[140px]"></div>
    </div>
    <div class="text-center relative z-10 px-6">
        <h1 class="text-6xl md:text-9xl font-serif font-bold mb-8 text-gray-800 leading-tight">
            Creative & <br><span class="text-accent-blue">Colorful</span>
        </h1>
        <button @click="document.getElementById('shop').scrollIntoView({behavior: 'smooth'})" 
                class="bg-accent-blue text-white px-12 py-5 rounded-full font-bold uppercase tracking-widest shadow-xl hover:bg-blue-600 transition-all">
            Explore Shop
        </button>
    </div>
    <div class="absolute bottom-10 left-0 right-0 flex justify-center text-accent-blue/40 animate-bounce">
        <i data-lucide="chevron-down" class="w-8 h-8"></i>
    </div>
</section>

<section id="concept" class="py-24 px-6 bg-white">
    <div class="max-w-4xl mx-auto text-center">
        <h2 class="text-4xl md:text-5xl font-serif font-bold mb-12">Concept</h2>
        <p class="text-lg leading-relaxed text-gray-600 italic">
            "日常に、もっと色彩を。" <br>
            Miho Takahashiの作品は、鮮やかなカラーパレットと大胆な構図が特徴です。<br>
            手にするだけで心が弾むような、エネルギーに満ちたプロダクトをお届けします。
        </p>
    </div>
</section>

<section id="lookbook" class="py-24 px-6 bg-gray-50">
    <div class="max-w-7xl mx-auto">
        <h2 class="text-4xl md:text-5xl font-serif font-bold mb-16 text-center">Look Book</h2>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
            <div class="aspect-[3/4] bg-gray-200 rounded-2xl overflow-hidden hover:opacity-90 transition-opacity"><img src="look1.jpg" class="w-full h-full object-cover" alt="look1"></div>
            <div class="aspect-[3/4] bg-gray-200 rounded-2xl overflow-hidden hover:opacity-90 transition-opacity"><img src="look2.jpg" class="w-full h-full object-cover" alt="look2"></div>
            <div class="aspect-[3/4] bg-gray-200 rounded-2xl overflow-hidden hover:opacity-90 transition-opacity"><img src="look3.jpg" class="w-full h-full object-cover" alt="look3"></div>
        </div>
    </div>
</section>

<section id="shop" class="py-24 px-6 bg-white">
    <div class="max-w-7xl mx-auto">
        <h2 class="text-4xl md:text-5xl font-serif font-bold mb-16 text-center">Shop</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-12">
            <template x-for="item in products" :key="item.id">
                <div class="flex flex-col items-center text-center group">
                    <div class="w-full aspect-square mb-6 bg-pink-50/50 rounded-[40px] flex items-center justify-center p-8 relative overflow-hidden transition-all group-hover:shadow-2xl">
                        <img :src="item.img" class="w-full h-full object-contain group-hover:scale-110 transition-transform duration-500">
                        <button @click="addToCart(item)" 
                                class="absolute bottom-6 right-6 bg-gray-900 w-14 h-14 rounded-full shadow-xl flex items-center justify-center z-20 md:opacity-0 md:group-hover:opacity-100 transition-all active:scale-90">
                            <span class="white-plus"></span>
                        </button>
                    </div>
                    <h3 class="text-xl font-bold" x-text="item.title"></h3>
                    <p class="text-gray-400 font-serif italic text-sm" x-text="'¥' + item.price.toLocaleString()"></p>
                </div>
            </template>
        </div>
    </div>
</section>

<footer id="footer" class="bg-gray-50 py-24 px-6 border-t border-gray-100">
    <div class="max-w-7xl mx-auto text-center">
        <h3 class="text-3xl font-bold text-accent-blue font-serif mb-8">Miho Takahashi</h3>
        <div class="flex justify-center space-x-8 mb-12">
            <a href="#" class="text-gray-400 hover:text-accent-blue transition-colors">Instagram</a>
            <a href="#" class="text-gray-400 hover:text-accent-blue transition-colors">Contact</a>
        </div>
        <p class="text-[10px] text-gray-300 font-bold tracking-[0.3em] uppercase">©2026 MIHO TAKAHASHI STUDIO.</p>
    </div>
</footer>

<div x-show="cartOpen" x-cloak class="fixed inset-0 z-[100]">
    <div @click="cartOpen = false" class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
    <div x-show="cartOpen" x-transition:enter="transition transform duration-300 translate-x-full" 
         class="absolute top-0 right-0 h-full w-full max-w-md bg-white shadow-2xl flex flex-col p-10">
        
        <div class="flex justify-between items-center mb-12">
            <h2 class="text-2xl font-serif font-bold" x-text="purchaseStep === 'cart' ? 'Your Cart' : 'Success!'"></h2>
            <button @click="cartOpen = false" class="p-2 bg-gray-100 rounded-full hover:bg-gray-200"><i data-lucide="x"></i></button>
        </div>

        <div class="flex-1 overflow-hidden">
            <template x-if="purchaseStep === 'cart'">
                <div class="h-full flex flex-col">
                    <div class="flex-1 overflow-y-auto pr-2">
                        <template x-if="cart.length === 0">
                            <div class="h-full flex flex-col items-center justify-center text-gray-300 italic"><p>Cart is empty.</p></div>
                        </template>
                        <template x-for="item in cart" :key="item.id">
                            <div class="flex space-x-6 mb-8 items-center border-b border-gray-50 pb-6">
                                <div class="w-20 h-20 bg-pink-50 rounded-2xl p-3 flex-shrink-0"><img :src="item.img" class="w-full h-full object-contain"></div>
                                <div class="flex-1 text-left"><h4 class="font-bold text-sm" x-text="item.title"></h4><p class="text-xs text-gray-400 font-serif italic" x-text="'¥' + item.price.toLocaleString()"></p></div>
                                <button @click="removeFromCart(item.id)" class="text-red-200 hover:text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </template>
                    </div>
                    <div x-show="cart.length > 0" class="pt-8 border-t bg-white">
                        <div class="flex justify-between items-center mb-8"><span class="text-gray-400 uppercase text-xs tracking-widest">Total</span><span class="text-3xl font-bold" x-text="'¥' + total.toLocaleString()"></span></div>
                        <button @click="processPurchase()" class="w-full bg-blue-600 text-white py-6 rounded-full font-bold uppercase tracking-widest shadow-xl hover:bg-blue-700 transition-all flex justify-center items-center">
                            <span x-text="isProcessing ? 'Processing...' : 'Checkout Now'"></span>
                        </button>
                    </div>
                </div>
            </template>
            <template x-if="purchaseStep === 'complete'">
                <div class="h-full flex flex-col items-center justify-center text-center space-y-6">
                    <div class="text-green-500 bg-green-50 w-24 h-24 rounded-full flex items-center justify-center"><i data-lucide="check-circle" class="w-12 h-12"></i></div>
                    <h3 class="text-3xl font-serif font-bold">Thank you!</h3>
                    <p class="text-gray-400 text-sm">ご注文を受け付けました。<br>発送まで今しばらくお待ちください。</p>
                    <button @click="cartOpen = false; purchaseStep = 'cart'" class="mt-8 text-accent-blue font-bold border-b-2 border-accent-blue pb-2">Back to Shop</button>
                </div>
            </template>
        </div>
    </div>
</div>

<script>
    function shopApp() {
        return {
            scrolled: false,
            cartOpen: false,
            mobileMenuOpen: false, 
            purchaseStep: 'cart',
            isProcessing: false,
            cart: [],
            products: [
                { id: '01', title: 'Art Mag Cup', price: 2800, img: 'mag.png' },
                { id: '02', title: 'Canvas Art Print', price: 12000, img: 'kaiga.png' },
                { id: '03', title: 'Design Cushion', price: 4500, img: 'cusion.png' },
                { id: '04', title: 'Artist T-shirt', price: 3800, img: 'shirt.png' },
            ],
            get cartCount() { return this.cart.reduce((sum, item) => sum + item.quantity, 0) },
            get total() { return this.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0) },
            addToCart(product) {
                const existing = this.cart.find(i => i.id === product.id);
                if (existing) { existing.quantity++ } else { this.cart.push({...product, quantity: 1}) }
                this.cartOpen = true;
                this.purchaseStep = 'cart';
                setTimeout(() => lucide.createIcons(), 100);
            },
            removeFromCart(id) { this.cart = this.cart.filter(i => i.id !== id) },
            processPurchase() {
                this.isProcessing = true;
                setTimeout(() => {
                    this.isProcessing = false;
                    this.purchaseStep = 'complete';
                    this.cart = [];
                    setTimeout(() => lucide.createIcons(), 100);
                }, 1000);
            },
            init() { lucide.createIcons(); }
        }
    }
</script>
</body>
</html>

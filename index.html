<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miho Takahashi | Creative & Colorful</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Tailwindの設定：Playfair Displayを使えるように定義 */
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'playfair': ['"Playfair Display"', 'serif'],
                        'sans': ['"Inter"', 'sans-serif'],
                    },
                    colors: {
                        'accent-blue': '#2962ff',
                    }
                }
            }
        }
        
        /* スクロールアニメーション用の設定 */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease-out;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body class="bg-[#FFF0F5] selection:bg-accent-blue selection:text-white font-sans">

    <nav id="navbar" class="fixed top-0 left-0 w-full z-50 transition-all duration-500 py-8">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <a href="#" class="text-2xl font-bold tracking-tight text-accent-blue font-playfair italic">Miho Takahashi</a>
            <div class="hidden md:flex items-center space-x-8">
                <a href="#" class="text-xs uppercase font-bold tracking-widest opacity-70 hover:opacity-100 transition-opacity">Home</a>
                <a href="#concept" class="text-xs uppercase font-bold tracking-widest opacity-70 hover:opacity-100 transition-opacity">Concept</a>
                <a href="#shop" class="text-xs uppercase font-bold tracking-widest opacity-70 hover:opacity-100 transition-opacity">Shop</a>
                <i data-lucide="shopping-cart" class="text-accent-blue w-5 h-5 cursor-pointer"></i>
            </div>
        </div>
    </nav>

    <section class="relative h-screen flex items-center justify-center overflow-hidden">
        <div class="relative z-10 text-center px-6">
            <h1 class="text-6xl md:text-9xl font-playfair italic font-bold mb-6 text-gray-800 leading-tight tracking-tight">
                Creative & <br> 
                <span class="text-accent-blue">Colorful</span>
            </h1>
            <p class="text-lg md:text-xl font-medium mb-12 text-gray-600 tracking-wide">想いを色鮮やかに、カタチにする。</p>
            <a href="#shop" class="bg-accent-blue text-white px-10 py-4 rounded-full font-bold uppercase tracking-widest hover:shadow-xl hover:scale-105 transition-all inline-block shadow-lg">
                View Shop
            </a>
        </div>
    </section>

    <section id="concept" class="py-32 px-6 bg-white reveal">
        <div class="max-w-4xl mx-auto text-center">
            <h2 class="text-4xl md:text-5xl font-playfair italic font-bold mb-12 text-gray-800">Concept</h2>
            <div class="text-lg text-gray-600 leading-relaxed space-y-6 font-sans">
                <p>日常に彩りを添える。ひとつひとつ、手作業で生まれる物語。</p>
                <p>WEBデザイン科の卒業制作として、美しさと機能性の融合を目指しました。</p>
            </div>
        </div>
    </section>

    <section id="shop" class="py-32 px-6 reveal">
        <div class="max-w-7xl mx-auto text-center">
            <h2 class="text-4xl md:text-5xl font-playfair italic font-bold mb-20 text-gray-800">Shop</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-pink-50 hover:shadow-xl transition-all">
                    <div class="aspect-square mb-6 bg-[#FFF0F5] rounded-2xl flex items-center justify-center p-4">
                        <img src="https://via.placeholder.com/400" alt="Item" class="w-full h-full object-contain">
                    </div>
                    <h3 class="font-bold text-gray-800 text-lg">Coming Soon</h3>
                    <p class="text-accent-blue font-bold">¥ --,---</p>
                </div>
            </div>
        </div>
    </section>

    <footer id="contact" class="py-20 px-6 bg-white border-t border-pink-100 text-center">
        <h3 class="text-xl font-playfair italic font-bold text-accent-blue mb-6">Miho Takahashi</h3>
        <p class="text-xs text-gray-400 font-bold tracking-[0.3em] uppercase">©2026 Grad Project / MIHO TAKAHASHI</p>
    </footer>

    <script>
        // Lucideアイコンの表示
        lucide.createIcons();

        // スクロール時にナビを白くする
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) {
                nav.classList.add('bg-white/90', 'backdrop-blur-md', 'shadow-md', 'py-4');
                nav.classList.remove('py-8');
            } else {
                nav.classList.remove('bg-white/90', 'backdrop-blur-md', 'shadow-md', 'py-4');
                nav.classList.add('py-8');
            }
        });

        // ふわっと出るアニメーションの設定
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>

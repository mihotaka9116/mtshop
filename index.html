<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miho Takahashi | Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        /* カスタム設定 */
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'accent-blue': '#2962ff' },
                    fontFamily: { 'playfair': ['"Playfair Display"', 'serif'] }
                }
            }
        }
        [x-cloak] { display: none !important; }
        .creative-underline { position: relative; }
        .creative-underline::after { content: ''; position: absolute; width: 0; height: 2px; bottom: -2px; left: 0; background-color: currentColor; transition: width 0.3s; }
        .creative-underline:hover::after { width: 100%; }
    </style>
</head>
<body class="bg-white selection:bg-accent-blue selection:text-white" x-data="shopApp()">

    <nav class="fixed top-0 left-0 w-full z-50 transition-all duration-500" 
         :class="scrolled ? 'bg-white/80 backdrop-blur-md py-4 shadow-sm' : 'bg-transparent py-8'"
         @scroll.window="scrolled = (window.pageYOffset > 50)">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <a href="#" class="text-2xl font-bold tracking-tight text-accent-blue font-playfair">Miho Takahashi</a>
            
            <div class="hidden md:flex items-center space-x-8">
                <template x-for="link in navLinks">
                    <a :href="link.href" class="text-xs uppercase font-bold tracking-widest creative-underline opacity-70 hover:opacity-100 transition-opacity" x-text="link.name"></a>
                </template>
                <button @click="cartOpen = true" class="relative p-2 text-accent-blue hover:scale-110 transition-transform">
                    <i data-lucide="shopping-cart"></i>
                    <span x-show="cartCount > 0" class="absolute -top-1 -right-1 bg-accent-blue text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center" x-text="cartCount"></span>
                </button>
            </div>

            <div class="flex items-center space-x-4 md:hidden">
                <button @click="cartOpen = true" class="relative p-2 text-accent-blue">
                    <i data-lucide="shopping-cart"></i>
                    <span x-show="cartCount > 0" class="absolute -top-1 -right-1 bg-accent-blue text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center" x-text="cartCount"></span>
                </button>
                <button @click="mobileMenuOpen = true" class="p-2 text-accent-blue relative z-[110]">
                    <i data-lucide="menu"></i>
                </button>
            </div>
        </div>
    </nav>

    <div x-show="mobileMenuOpen" 
         x-cloak
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-[-10px]"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center space-y-8 md:hidden">
        
        <button @click="mobileMenuOpen = false" class="absolute top-8 right-6 p-2 text-accent-blue">
            <i data-lucide="x" class="w-8 h-8"></i>
        </button>

        <template x-for="link in navLinks">
            <a :href="link.href" 
               @click="mobileMenuOpen = false" 
               class="text-2xl font-bold text-accent-blue tracking-widest font-playfair" 
               x-text="link.name"></a>
        </template>
    </div>

    <section class="relative h-screen flex items-center justify-center bg-[#FFF0F5]">
        <div class="text-center px-6">
            <h1 class="text-5xl md:text-8xl font-playfair font-bold mb-6 text-gray-800">Creative & <br><span class="text-accent-blue">Colorful</span></h1>
            <button @click="document.getElementById('shop').scrollIntoView({behavior: 'smooth'})" class="bg-accent-blue text-white px-10 py-4 rounded-full font-bold uppercase tracking-widest hover:scale-105 transition-all shadow-lg">View Shop</button>
        </div>
    </section>

    <section id="shop" class="py-32 px-6 bg-white">
        </section>

    <script>
        function shopApp() {
            return {
                scrolled: false,
                cartOpen: false,
                mobileMenuOpen: false,
                cart: [],
                navLinks: [
                    { name: 'Home', href: '#' },
                    { name: 'Concept', href: '#concept' },
                    { name: 'Detail', href: '#detail' },
                    { name: 'Look Book', href: '#lookbook' },
                    { name: 'Shop', href: '#shop' },
                    { name: 'Contact', href: '#contact' },
                ],
                products: [
                    { id: '01', title: 'Mag Cup', price: 2800, img: 'https://via.placeholder.com/200' },
                    { id: '02', title: 'Picture', price: 12000, img: 'https://via.placeholder.com/200' },
                    { id: '03', title: 'Cushion', price: 4500, img: 'https://via.placeholder.com/200' },
                    { id: '04', title: 'T-shirt', price: 3800, img: 'https://via.placeholder.com/200' },
                ],
                get cartCount() { return this.cart.reduce((sum, item) => sum + item.quantity, 0) },
                get total() { return this.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0) },
                addToCart(product) {
                    const existing = this.cart.find(i => i.id === product.id);
                    if (existing) { existing.quantity++ } else { this.cart.push({...product, quantity: 1}) }
                    this.cartOpen = true;
                    this.$nextTick(() => lucide.createIcons());
                },
                init() { 
                    lucide.createIcons();
                    this.$watch('mobileMenuOpen', value => {
                        if (value) this.$nextTick(() => lucide.createIcons());
                    });
                }
            }
        }
    </script>
</body>
</html>

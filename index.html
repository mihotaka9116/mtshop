<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miho Takahashi | Creative Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'accent-blue': '#007AFF'
                    }
                }
            }
        }
    </script>
    <style>
        .font-serif { font-family: "Playfair Display", "Times New Roman", serif; }
        [x-cloak] { display: none !important; }
        html { scroll-behavior: smooth; }
        section { scroll-margin-top: 80px; }

        .white-plus {
            position: relative;
            width: 18px;
            height: 18px;
            display: inline-block;
        }
        .white-plus::before, .white-plus::after {
            content: '';
            position: absolute;
            background-color: white;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .white-plus::before { width: 3px; height: 100%; }
        .white-plus::after { width: 100%; height: 3px; }
    </style>
</head>
<body class="bg-white text-gray-900" x-data="shopApp()">

<nav class="fixed top-0 left-0 w-full z-50 transition-all duration-500" 
     :class="scrolled ? 'bg-white/95 backdrop-blur-md py-4 shadow-md' : 'bg-transparent py-8'"
     @scroll.window="scrolled = (window.pageYOffset > 50)">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
        <a href="#home" class="text-2xl font-bold text-accent-blue font-serif">Miho Takahashi</a>
        
        <div class="flex items-center space-x-6">
            <div class="hidden md:flex items-center space-x-8 text-[10px] uppercase font-black tracking-widest">
                <a href="#home" class="hover:text-accent-blue transition-colors">Home</a>
                <a href="#concept" class="hover:text-accent-blue transition-colors">Concept</a>
                <a href="#lookbook" class="hover:text-accent-blue transition-colors">Look Book</a>
                <a href="#shop" class="hover:text-accent-blue transition-colors">Shop</a>
            </div>

            <button @click="cartOpen = true" class="relative p-2 text-accent-blue z-50">
                <i data-lucide="shopping-cart"></i>
                <span x-show="cartCount > 0" 
                      class="absolute -top-1 -right-1 bg-gray-900 text-white text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-white shadow-lg" 
                      x-text="cartCount"></span>
            </button>

            <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden text-accent-blue relative z-[100] p-2">
                <i data-lucide="menu" x-show="!mobileMenuOpen"></i>
                <i data-lucide="x" x-show="mobileMenuOpen" x-cloak></i>
            </button>
        </div>
    </div>
</nav>

<div x-show="mobileMenuOpen" 
     x-cloak
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0 -translate-y-4"
     x-transition:enter-end="opacity-100 translate-y-0"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100 translate-y-0"
     x-transition:leave-end="opacity-0 -translate-y-4"
     class="fixed inset-0 bg-white z-[90] flex flex-col items-center justify-center space-y-8 md:hidden">
    
    <a href="#home" @click="mobileMenuOpen = false" class="text-3xl font-serif font-bold hover:text-accent-blue transition-colors">Home</a>
    <a href="#concept" @click="mobileMenuOpen = false" class="text-3xl font-serif font-bold hover:text-accent-blue transition-colors">Concept</a>
    <a href="#lookbook" @click="mobileMenuOpen = false" class="text-3xl font-serif font-bold hover:text-accent-blue transition-colors">Look Book</a>
    <a href="#shop" @click="mobileMenuOpen = false" class="text-3xl font-serif font-bold hover:text-accent-blue transition-colors">Shop</a>
</div>

<section id="home" class="relative h-screen flex items-center justify-center bg-[#FFF5F7] overflow-hidden">
    <div class="absolute inset-0 z-0 hidden md:block">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[700px] h-[700px] bg-pink-200/60 rounded-full blur-[140px]"></div>
    </div>

    <div class="text-center relative z-10 px-6">
        <h1 class="text-6xl md:text-9xl font-serif font-bold mb-8 text-gray-800 leading-tight">
            Creative & <br><span class="text-accent-blue">Colorful</span>
        </h1>
        
        <button @click="document.getElementById('shop').scrollIntoView({behavior: 'smooth'})" 
                class="bg-transparent text-accent-blue border-2 border-accent-blue px-12 py-5 rounded-full font-bold uppercase tracking-widest hover:bg-accent-blue hover:text-white transition-all transform active:scale-95 shadow-lg shadow-accent-blue/5">
            Explore Shop
        </button>
    </div>

    <div class="absolute bottom-10 left-0 right-0 flex justify-center text-accent-blue/40 animate-bounce">
        <i data-lucide="chevron-down" class="w-8 h-8"></i>
    </div>
</section>

<script>
    function shopApp() {
        return {
            scrolled: false,
            cartOpen: false,
            mobileMenuOpen: false,
            detailOpen: false,
            selectedItem: null,
            purchaseStep: 'cart',
            isProcessing: false,
            cart: [],
            products: [
                { id: '01', title: 'Art Mag Cup', price: 2800, img: 'mag.png', description: '朝のコーヒータイムを彩る、色彩豊かなオリジナルマグカップです。', size: 'H95mm x W80mm', material: 'Ceramic' },
                { id: '02', title: 'Canvas Art Print', price: 12000, img: 'kaiga.png', description: '高品質なキャンバスにジークレープリントを施した、空間を引き立てる一点。', size: 'F4 (333mm x 242mm)', material: 'Canvas, Wood' },
                { id: '03', title: 'Design Cushion', price: 4500, img: 'cusion.png', description: '手触りの良い素材に、ダイナミックなグラフィックをプリントしました。', size: '45cm x 45cm', material: 'Polyester, Cotton' },
                { id: '04', title: 'Artist T-shirt', price: 3800, img: 'shirt.png', description: '日常にアートを纏う。肌馴染みの良い上質なコットンを使用した一枚。', size: 'S, M, L, XL', material: '100% Cotton' },
            ],
            openDetail(item) { this.selectedItem = item; this.detailOpen = true; setTimeout(() => lucide.createIcons(), 100); },
            get cartCount() { return this.cart.reduce((sum, item) => sum + item.quantity, 0) },
            get total() { return this.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0) },
            addToCart(product) {
                const existing = this.cart.find(i => i.id === product.id);
                if (existing) { existing.quantity++ } else { this.cart.push({...product, quantity: 1}) }
                this.cartOpen = true;
                this.purchaseStep = 'cart';
                setTimeout(() => lucide.createIcons(), 100);
            },
            removeFromCart(id) { this.cart = this.cart.filter(i => i.id !== id) },
            processPurchase() {
                this.isProcessing = true;
                setTimeout(() => {
                    this.isProcessing = false;
                    this.purchaseStep = 'complete';
                    this.cart = [];
                    setTimeout(() => lucide.createIcons(), 100);
                }, 1000);
            },
            init() { 
                lucide.createIcons();
                setTimeout(() => lucide.createIcons(), 100);
            }
        }
    }
</script>
</body>
</html>

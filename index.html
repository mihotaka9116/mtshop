<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miho Takahashi | Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        tailwind.config = { theme: { extend: { colors: { 'accent-blue': '#007AFF' } } } }
        .creative-underline { position: relative; }
        .creative-underline::after { content: ''; position: absolute; width: 0; height: 2px; bottom: -2px; left: 0; background-color: currentColor; transition: width 0.3s; }
        .creative-underline:hover::after { width: 100%; }
        [x-cloak] { display: none !important; }
        /* スムーズなスクロールを有効化 */
        html { scroll-behavior: smooth; }
        /* 固定ナビゲーションに隠れないよう、スクロール位置を調整 */
        section { scroll-margin-top: 80px; }
    </style>
</head>
<body class="bg-white selection:bg-accent-blue selection:text-white" x-data="shopApp()">

<nav class="fixed top-0 left-0 w-full z-50 transition-all duration-500" 
     :class="scrolled ? 'bg-white/80 backdrop-blur-md py-4 shadow-sm' : 'bg-transparent py-8'"
     @scroll.window="scrolled = (window.pageYOffset > 50)">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
        <a href="#home" class="text-2xl font-bold tracking-tight text-accent-blue">Miho Takahashi</a>
        
        <div class="flex items-center space-x-4">
            <div class="hidden md:flex items-center space-x-8 mr-4">
                <template x-for="link in navLinks">
                    <a :href="link.href" class="text-xs uppercase font-bold tracking-widest creative-underline opacity-70 hover:opacity-100 transition-opacity" x-text="link.name"></a>
                </template>
            </div>

            <button @click="cartOpen = true" class="relative p-2 text-accent-blue">
                <i data-lucide="shopping-cart"></i>
                <span x-show="cartCount > 0" class="absolute -top-1 -right-1 bg-accent-blue text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center" x-text="cartCount"></span>
            </button>

            <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden p-2 text-accent-blue z-[60]">
                <span x-show="!mobileMenuOpen"><i data-lucide="menu"></i></span>
                <span x-show="mobileMenuOpen" x-cloak><i data-lucide="x"></i></span>
            </button>
        </div>
    </div>

    <div x-show="mobileMenuOpen" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-cloak
         class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center md:hidden">
        <div class="flex flex-col items-center space-y-8">
            <template x-for="link in navLinks">
                <a :href="link.href" 
                   @click="mobileMenuOpen = false"
                   class="text-2xl uppercase font-bold tracking-[0.2em] text-gray-800 hover:text-accent-blue" 
                   x-text="link.name"></a>
            </template>
        </div>
    </div>
</nav>

    <section id="home" class="relative h-screen flex items-center justify-center bg-[#FFF0F5]">
        <div class="text-center px-6">
            <h1 class="text-5xl md:text-8xl font-serif font-bold mb-6 text-gray-800">Creative & <br><span class="text-accent-blue">Colorful</span></h1>
            <button @click="document.getElementById('shop').scrollIntoView({behavior: 'smooth'})" class="bg-accent-blue text-white px-10 py-4 rounded-full font-bold uppercase tracking-widest hover:scale-105 transition-all">View Shop</button>
        </div>
    </section>

    <section id="concept" class="py-32 px-6 bg-white">
        <div class="max-w-3xl mx-auto text-center">
            <span class="text-accent-blue text-xs font-bold tracking-[0.3em] uppercase block mb-8">Concept</span>
            <h2 class="text-3xl md:text-4xl font-serif font-bold mb-10 leading-relaxed text-gray-800">
                日常を彩る、<br class="md:hidden">小さな物語。
            </h2>
            <p class="text-gray-500 leading-relaxed text-base md:text-lg">
                Miho Takahashiの描く世界は、何気ない日常を少しだけ特別なものに変えます。<br class="hidden md:block">
                制作されたイラストから生まれたプロダクトたちが、<br class="hidden md:block">
                あなたの暮らしにワクワクと彩りをお届けします。
            </p>
        </div>
    </section>

    <section id="lookbook" class="py-32 px-6 bg-[#fafafa]">
        <div class="max-w-7xl mx-auto">
            <div class="text-center mb-20">
                <span class="text-accent-blue text-xs font-bold tracking-[0.3em] uppercase block mb-4">Look Book</span>
                <h2 class="text-3xl md:text-4xl font-serif font-bold text-gray-800">Collections</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12 md:gap-20">
                <div class="text-center">
                    <div class="aspect-video w-full mb-6 overflow-hidden rounded-lg bg-gray-100">
                        <img src="sinkaiwhite.svg" alt="Winter" class="w-full h-full object-cover">
                    </div>
                    <h3 class="font-serif text-xl text-gray-800 italic">2025 Winter collection</h3>
                </div>
                <div class="text-center">
                    <div class="aspect-video w-full mb-6 overflow-hidden rounded-lg bg-gray-100">
                        <img src="siteimage.svg" alt="Spring" class="w-full h-full object-cover">
                    </div>
                    <h3 class="font-serif text-xl text-gray-800 italic">2026 Spring collection</h3>
                </div>
            </div>
        </div>
    </section>

    <section id="shop" class="py-32 px-6 bg-white">
        <div class="max-w-7xl mx-auto">
            <h2 class="text-4xl md:text-5xl font-serif font-bold mb-20 text-center">Shop</h2>
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                <template x-for="item in products" :key="item.id">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center text-center group">
                        <div class="w-full aspect-square mb-4 bg-pink-50 rounded-xl flex items-center justify-center p-4 relative">
                            <img :src="item.img" class="w-full h-full object-contain group-hover:scale-110 transition-transform">
                            <button @click="addToCart(item)" class="absolute inset-0 flex items-center justify-center bg-accent-blue/10 opacity-0 group-hover:opacity-100 transition-opacity rounded-xl">
                                <span class="bg-accent-blue text-white p-3 rounded-full shadow-lg"><i data-lucide="plus"></i></span>
                            </button>
                        </div>
                        <h3 class="font-bold text-gray-800" x-text="item.title"></h3>
                        <p class="text-sm text-gray-500" x-text="'¥' + item.price.toLocaleString()"></p>
                    </div>
                </template>
            </div>
        </div>
    </section>

    <footer id="contact" class="bg-white border-t border-pink-100 pt-20 pb-10 px-6">
        <div class="max-w-7xl mx-auto text-center">
            <p class="text-gray-400 text-[10px] tracking-[0.3em]">©2026 MIHO TAKAHASHI ALL RIGHTS RESERVED.</p>
        </div>
    </footer>

    <div x-show="cartOpen" x-cloak class="fixed inset-0 z-[70]">
        <div x-show="cartOpen" @click="cartOpen = false" class="absolute inset-0 bg-black/20 backdrop-blur-sm"></div>
        <div x-show="cartOpen" x-transition:enter="transition ease-out duration-300 transform" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0" class="absolute top-0 right-0 h-full w-full max-w-md bg-white shadow-2xl flex flex-col">
            <div class="p-6 border-b flex justify-between items-center">
                <h2 class="text-xl font-bold">Shopping Cart</h2>
                <button @click="cartOpen = false" class="p-2 hover:bg-gray-100 rounded-full"><i data-lucide="x"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-6">
                <template x-if="cart.length === 0">
                    <p class="text-center text-gray-400 py-10">Your cart is empty</p>
                </template>
                </div>
        </div>
    </div>

<script>
    function shopApp() {
        return {
            scrolled: false,
            cartOpen: false,
            mobileMenuOpen: false, 
            cart: [],
            navLinks: [
                { name: 'Home', href: '#home' },
                { name: 'Concept', href: '#concept' },
                { name: 'Look Book', href: '#lookbook' },
                { name: 'Shop', href: '#shop' },
                { name: 'Contact', href: '#contact' },
            ],
            products: [
                { id: '01', title: 'Mag Cup', price: 2800, img: 'mag.png' },
                { id: '02', title: 'Art Print', price: 12000, img: 'kaiga.png' },
                { id: '03', title: 'Cushion', price: 4500, img: 'cusion.png' },
                { id: '04', title: 'T-shirt', price: 3800, img: 'shirt.png' },
            ],
            get cartCount() { return this.cart.reduce((sum, item) => sum + item.quantity, 0) },
            addToCart(product) {
                const existing = this.cart.find(i => i.id === product.id);
                if (existing) { existing.quantity++ } else { this.cart.push({...product, quantity: 1}) }
                this.cartOpen = true;
                setTimeout(() => lucide.createIcons(), 10);
            },
            init() { lucide.createIcons(); }
        }
    }
</script>
</body>
</html>
